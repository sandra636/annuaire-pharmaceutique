name: Vérification du projet WordPress

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  verification:
    runs-on: ubuntu-latest
    
    steps:
      - name: Récupération du code
        uses: actions/checkout@v3

      - name: Vérification de la structure du projet
        run: |
          echo "✅ Vérification du dépôt..."
          
          # Vérifier que le .gitignore existe
          if [ -f ".gitignore" ]; then
            echo "✅ .gitignore présent"
          else
            echo "❌ .gitignore manquant"
            exit 1
          fi
          
          # Vérifier que le README existe
          if [ -f "README.md" ]; then
            echo "✅ README.md présent"
          else
            echo "❌ README.md manquant"
            exit 1
          fi
          
          echo "✅ Structure du projet validée avec succès !"